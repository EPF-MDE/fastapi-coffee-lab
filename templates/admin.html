<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Virtual Coffeeshop</title>

    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css" />

    <style>
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: light;
          --bg: #fff;
          --accent-bg: #f5f7ff;
          --text: #212121;
          --text-light: #585858;
          --accent: #0d47a1;
          --accent-hover: #1266e2;
          --accent-text: var(--bg);
          --code: #d81b60;
          --preformatted: #444;
          --marked: #ffdd33;
          --disabled: #efefef;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Virtual coffeeshop</h1>
    </header>
    <h3>Admin</h3>
    <form action="/coffees" method="post">
      <label for="name">Name</label>
      <input type="text" name="name" />
      <label for="price">Price</label>
      <input type="text" name="price" />
      <fieldset>
        <legend>Is Offer?</legend>
        <div>
          <input type="radio" id="yes" name="is_offer" value="1" />
          <label for="yes">Yes</label>
        </div>

        <div>
          <input type="radio" id="no" name="is_offer" value="0" checked />
          <label for="no">No</label>
        </div>
      </fieldset>
      <input type="hidden" name="admin" value="1" />
      <button type="submit">Create / Update</button>
    </form>
    <footer><a href="/">Menu</a></footer>
  </body>
</html>
