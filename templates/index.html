{% extends "base.html" %} {%block title%}Menu{%endblock%} {%block
header%}Virtual coffeeshop{%endblock%} {%block content%}
<h3>Menu</h3>
<div>You have {{money}}€ in pocket</div>
<ul
  id="coffees"
  hx-get="/coffees?admin={{admin}}"
  hx-swap="innerHTML"
  hx-trigger="load"
>
  <li style="list-style-type: none" class="htmx-indicator">
    <img style="width: 25%" src="static/coffee-break.gif" alt="Loading..." />
  </li>
</ul>
{%endblock%} {%block footer%} {%if admin%}
<a href="/coffees?admin=1">Add a new coffee to the menu</a>
<a href="/">Exit admin mode</a>
{%else%}
<a href="/?admin=1">Enter admin mode</a>
{%endif%}{%endblock%}
